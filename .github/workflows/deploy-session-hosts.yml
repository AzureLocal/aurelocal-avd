name: Deploy AVD Session Hosts

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: 'Resource group name'
        required: true
        default: 'rg-avd-prod'
      vm_count:
        description: 'Number of session hosts to deploy'
        required: true
        default: '2'

permissions:
  id-token: write
  contents: read

env:
  BICEP_FILE: infrastructure/bicep/session-hosts/main.bicep
  BICEP_PARAMS: infrastructure/bicep/session-hosts/main.bicepparam

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep Build (lint)
        run: az bicep build --file ${{ env.BICEP_FILE }}

      - name: What-if deployment
        run: |
          az deployment group what-if \
            --resource-group ${{ github.event.inputs.resource_group_name }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.BICEP_PARAMS }} \
            --parameters vmCount=${{ github.event.inputs.vm_count }}

  deploy:
    name: Deploy Session Hosts
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Deploy Session Hosts
        run: |
          az deployment group create \
            --name "avd-session-hosts-$(date +%Y%m%d%H%M%S)" \
            --resource-group ${{ github.event.inputs.resource_group_name }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.BICEP_PARAMS }} \
            --parameters vmCount=${{ github.event.inputs.vm_count }}

      - name: Verify session hosts
        run: |
          echo "Waiting 120s for AVD agent registration..."
          sleep 120
          POOL_NAME=$(az deployment group show \
            --resource-group ${{ github.event.inputs.resource_group_name }} \
            --name "avd-session-hosts-$(date +%Y%m%d%H%M%S)" \
            --query "properties.parameters.vmNamePrefix.value" -o tsv 2>/dev/null || echo "unknown")
          echo "Session hosts deployed with prefix: ${POOL_NAME}"
          echo "Verify in Azure Portal: AVD > Host Pools > Session Hosts"
