# =============================================================================
# validate-config.yml — Validate config/variables.example.yml against schema
# =============================================================================
# Triggered on PRs and pushes that touch config/ or this workflow.
# Validates YAML syntax and JSON Schema compliance.
# =============================================================================

name: Validate Configuration

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - '.github/workflows/validate-config.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

        - name: Validate canonical config files
        run: python3 scripts/validate-config.py

        - name: Validate negative schema fixtures fail
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys
          import yaml
          from jsonschema import ValidationError, validate

          root = pathlib.Path('.').resolve()
          schema = json.loads((root / 'config' / 'schema' / 'variables.schema.json').read_text(encoding='utf-8'))
          invalid_dir = root / 'tests' / 'schemas'
          invalid_files = sorted(invalid_dir.glob('invalid-*.yml'))
          if not invalid_files:
            print('No negative fixtures found; skipping.')
            sys.exit(0)

          failures = []
          for file in invalid_files:
            data = yaml.safe_load(file.read_text(encoding='utf-8'))
            try:
              validate(instance=data, schema=schema)
              failures.append(file.name)
            except ValidationError:
              print(f'Expected failure confirmed: {file.name}')

          if failures:
            print('These files unexpectedly passed schema validation:')
            for name in failures:
              print(f' - {name}')
            sys.exit(1)
          PY
