name: CI — PowerShell Lint

on:
  pull_request:
    paths:
      - "src/powershell/**"
  push:
    branches: [main]
    paths:
      - "src/powershell/**"

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path src/powershell -Recurse -Settings PSGallery -Severity Warning,Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: All clear."

  pester:
    name: Pester Tests
    runs-on: ubuntu-latest
    if: hashFiles('tests/powershell/**/*.Tests.ps1') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/powershell"
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "tests/powershell/results.xml"
          $config.TestResult.OutputFormat = "JUnitXml"
          Invoke-Pester -Configuration $config
