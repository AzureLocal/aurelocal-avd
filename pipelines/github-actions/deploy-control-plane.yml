name: Deploy AVD Control Plane

on:
  push:
    branches:
      - main
    paths:
      - 'bicep/control-plane/**'
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'
      resource_group_name:
        description: 'Resource group name'
        required: true
        default: 'rg-avd-prod'
      host_pool_name:
        description: 'Host pool name'
        required: true
        default: 'hp-azurelocal-pool01'

permissions:
  id-token: write   # Required for OIDC login
  contents: read

env:
  BICEP_FILE: bicep/control-plane/main.bicep
  BICEP_PARAMS: bicep/control-plane/main.bicepparam

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep Build (lint)
        run: az bicep build --file ${{ env.BICEP_FILE }}

      - name: What-if deployment
        run: |
          az deployment sub what-if \
            --location ${{ github.event.inputs.location || 'eastus' }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.BICEP_PARAMS }}

  deploy:
    name: Deploy Control Plane
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Deploy AVD Control Plane
        run: |
          DEPLOYMENT_NAME="avd-control-plane-$(date +%Y%m%d%H%M%S)"
          echo "DEPLOYMENT_NAME=${DEPLOYMENT_NAME}" >> "$GITHUB_ENV"
          az deployment sub create \
            --name "${DEPLOYMENT_NAME}" \
            --location ${{ github.event.inputs.location || 'eastus' }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.BICEP_PARAMS }}

      - name: Store domain-join password in Key Vault
        if: ${{ secrets.DOMAIN_JOIN_PASSWORD != '' }}
        run: |
          KV_NAME=$(az deployment sub show \
            --name "${DEPLOYMENT_NAME}" \
            --query "properties.outputs.keyVaultId.value" -o tsv | awk -F'/' '{print $NF}')
          az keyvault secret set \
            --vault-name "${KV_NAME}" \
            --name "domain-join-password" \
            --value "${{ secrets.DOMAIN_JOIN_PASSWORD }}" \
            --output none
