site_name: Azure Virtual Desktop on Azure Local
site_description: IaC and automation for deploying AVD on Azure Local
site_url: https://azurelocal.github.io/aurelocal-avd/
repo_url: https://github.com/AzureLocal/aurelocal-avd
repo_name: AzureLocal/aurelocal-avd

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Getting Started: getting-started.md
  - Guides:
      - AVD Deployment Guide: guides/avd-deployment-guide.md
  - Scenarios: scenarios.md
  - Reference:
      - Variables: reference/variables.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal
  homepage: https://azurelocal.cloud
