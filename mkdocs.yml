site_name: Azure Virtual Desktop on Azure Local
site_description: IaC and automation for deploying AVD on Azure Local
site_url: https://azurelocal.github.io/aurelocal-avd/
repo_url: https://github.com/AzureLocal/aurelocal-avd
repo_name: AzureLocal/aurelocal-avd

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Deep Architecture:
    - Deep Design: architecture/deep-design.md
    - FSLogix Integration: architecture/fslogix-integration.md
  - Getting Started: getting-started.md
  - Guides:
      - AVD Deployment Guide: guides/avd-deployment-guide.md
      - RemoteApps Guide: guides/rdapps.md
  - Scenarios: scenarios.md
  - Operations:
      - Cost Management: operations/cost-management.md
      - Defender Operations: security/defender-operations.md
  - Reference:
      - Variables: reference/variables.md
      - Variable Mapping: reference/variable-mapping.md
      - Tool Parity Matrix: reference/tool-parity-matrix.md
      - Phase Ownership: reference/phase-ownership.md
      - Monitoring Queries: reference/monitoring-queries.md
      - Host Pool Options: reference/host-pool-options.md
      - RBAC Reference: reference/rbac.md
      - Docs Validation Checklist: reference/docs-validation-checklist.md
  - Diagrams: diagrams/index.md
  - Standards:
      - Overview: standards/index.md
      - Documentation: standards/documentation.md
      - Scripting: standards/scripting.md
      - Variables: standards/variables.md
      - Naming Conventions: standards/naming.md
      - Solutions: standards/solutions.md
      - Infrastructure: standards/infrastructure.md
      - Automation: standards/automation.md
      - Examples & IIC: standards/examples.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/countrycloudboy
      name: CountryCloudBoy on X
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/aurelocal-avd
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: Azure Local Community
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; 2025 Azure Local. Designed and maintained by
  <a href="https://www.hybridsolutions.cloud">Hybrid Cloud Solutions</a>.
