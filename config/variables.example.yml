# =============================================================================
# Central Variable Reference — azurelocal-avd
# =============================================================================
# Copy this file to variables.yml and fill in your values.
# DO NOT commit variables.yml — it is .gitignore'd.
#
# All secrets use keyvault:// URIs — resolved at deploy time via Key Vault.
# Never store passwords, keys, or tokens as plain text in this file.
#
# Workflow: config → infrastructure → deploy → configure → tests
# =============================================================================

# -----------------------------------------------------------------------------
# Subscription & Global
# -----------------------------------------------------------------------------
subscription:
  # AVD subscription — host pool, app group, workspace, and session host VMs deploy here
  avd_subscription_id: "00000000-0000-0000-0000-000000000000"
  # Azure Local subscription — cluster, custom location, logical networks, images
  azure_local_subscription_id: "00000000-0000-0000-0000-000000000000"
  tenant_id: "00000000-0000-0000-0000-000000000000"
  location: "eastus"

# -----------------------------------------------------------------------------
# Deployment Mode
# -----------------------------------------------------------------------------
deployment:
  mode: "greenfield"                          # greenfield | brownfield (brownfield skips RG creation)
  naming_convention: "iic"                    # Used as infix in resource names: {type}-{naming}-{workload}-{region}-{instance}

# -----------------------------------------------------------------------------
# Security — Key Vault
# -----------------------------------------------------------------------------
security:
  key_vault_name: "kv-iic-platform"           # Platform Key Vault for all secret resolution
  key_vault_resource_group: "rg-iic-mgmt-eus-01"

# -----------------------------------------------------------------------------
# Control Plane (infrastructure/ → deploy/)
# -----------------------------------------------------------------------------
control_plane:
  resource_group: "rg-iic-avd-hp-eus-01"     # Resource group for host pool + app group + workspace
  host_pool_name: "hp-iic-avd-pool01"
  host_pool_type: "Pooled"                    # Pooled | Personal
  load_balancer_type: "BreadthFirst"          # BreadthFirst | DepthFirst (ignored for Personal)
  max_session_limit: 16                       # Max concurrent sessions per host (Pooled only)
  preferred_app_group_type: "Desktop"         # Desktop | RailApplications | None
  personal_assignment_type: "Automatic"       # Automatic | Direct (Personal only)
  start_vm_on_connect: false                  # Requires Desktop Virtualization Power On Contributor RBAC
  validation_environment: false               # Receives service updates before production
  custom_rdp_properties: ""                   # Semicolon-delimited RDP properties
  host_pool_friendly_name: ""
  host_pool_description: ""
  app_group_name: "vdag-iic-avd-eus-01"
  app_group_type: "Desktop"                   # Desktop | RemoteApp
  app_group_friendly_name: ""
  workspace_name: "vdws-iic-avd-eus-01"
  workspace_friendly_name: ""

# -----------------------------------------------------------------------------
# Session Hosts (infrastructure/ → deploy/)
# -----------------------------------------------------------------------------
session_hosts:
  resource_group: "rg-iic-avd-sh-eus-01"     # Resource group for session host VMs (can differ from control plane)
  session_host_count: 2
  vm_naming_prefix: "vm-iicavd"               # VMs named {prefix}-001, {prefix}-002, etc.
  vm_start_index: 1
  vm_processors: 4                            # vCPUs per session host
  vm_memory_mb: 16384                         # Memory in MB per session host
  vm_admin_username: "avd_admin"
  vm_admin_password: "keyvault://kv-iic-platform/avd-local-admin-password"
  session_host_os: "Windows-11-Enterprise-Multi-Session"

  # Azure Local infrastructure references (full ARM resource IDs)
  custom_location_id: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azurelocal/providers/Microsoft.ExtendedLocation/customLocations/cl-azurelocal-01"
  logical_network_id: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azurelocal/providers/Microsoft.AzureStackHCI/logicalNetworks/lnet-compute-01"
  gallery_image_id: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azurelocal/providers/Microsoft.AzureStackHCI/marketplaceGalleryImages/img-win11-avd-m365"
  storage_path_id: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azurelocal/providers/Microsoft.AzureStackHCI/storageContainers/sp-vmstore-01"

# -----------------------------------------------------------------------------
# Domain Join
# -----------------------------------------------------------------------------
domain:
  domain_fqdn: "iic.local"
  domain_join_username: "svc.domainjoin"      # FQDN-qualified at deploy time: {domain_fqdn}\{username}
  domain_join_password: "keyvault://kv-iic-platform/domain-join-password"
  domain_join_ou_path: ""                     # Empty = default Computers container

# -----------------------------------------------------------------------------
# Identity & Entra ID Authentication
# -----------------------------------------------------------------------------
identity:
  strategy: "hybrid_join"                     # hybrid_join | entra_join | ad_only
  entra_id:
    enable_entra_id_auth: false               # Installs AADLoginForWindows extension + RDP SSO
    enroll_in_intune: false                   # Register session hosts in Intune MDM
    entra_user_login_group_id: ""             # Object ID of Entra group for VM User Login RBAC
    entra_admin_login_group_id: ""            # Object ID of Entra group for VM Administrator Login RBAC
  rbac:
    desktop_virtualization_user_group_id: ""   # Object ID of group for Desktop Virtualization User role
    desktop_virtualization_admin_group_id: ""  # Object ID of group for Desktop Virtualization Contributor role
    power_on_contributor_group_id: ""          # Object ID of group for Desktop Virtualization Power On Contributor

# -----------------------------------------------------------------------------
# FSLogix Profile Management
# -----------------------------------------------------------------------------
fslogix:
  enabled: false                              # Enable FSLogix profile container configuration
  share_topology: "single"                    # single | split | cloud_cache

  # Single share — one VHDx per user on a single SMB path
  single_share:
    vhd_path: "\\\\sofs-01.iic.local\\profiles$"

  # Split topology — separate shares for profile and Office containers
  split_shares:
    profile_vhd_path: "\\\\sofs-01.iic.local\\profiles$"
    office_vhd_path: "\\\\sofs-01.iic.local\\odfc$"

  # Cloud Cache — multi-site replication with ordered provider list
  cloud_cache:
    connections:
      - "type=smb,connectionString=\\\\sofs-01.iic.local\\profiles$"
      # - "type=smb,connectionString=\\\\sofs-02.iic.local\\profiles$"

  profile_container:
    size_in_mb: 30000                         # Max VHDx size per user (default 30 GB)
    vhd_type: "VHDX"                          # VHD | VHDX
    flip_flop_enabled: false                  # Newer profile container naming (recommended for new deployments)
    delete_on_logoff: false                   # Delete local VHDx cache on logoff
    is_dynamic: true                          # Dynamic vs fixed-size VHDx
    locked_retry_count: 12                    # Retry attempts when VHDx is locked
    locked_retry_interval: 5                  # Seconds between retry attempts

# -----------------------------------------------------------------------------
# Scaling Plan (Pooled host pools only)
# -----------------------------------------------------------------------------
scaling:
  enabled: false                              # Enable AVD scaling plan
  time_zone: "Eastern Standard Time"
  schedules:
    - name: "Weekday"
      days_of_week:
        - "Monday"
        - "Tuesday"
        - "Wednesday"
        - "Thursday"
        - "Friday"
      ramp_up:
        start_time: "07:00"
        load_balancer_type: "BreadthFirst"
        minimum_host_percent: 20
        capacity_threshold_percent: 60
      peak:
        start_time: "09:00"
        load_balancer_type: "BreadthFirst"
      ramp_down:
        start_time: "17:00"
        load_balancer_type: "DepthFirst"
        minimum_host_percent: 10
        capacity_threshold_percent: 90
        force_logoff: true
        wait_time_minutes: 30
        notification_message: "Your session will end in 30 minutes. Please save your work."
      off_peak:
        start_time: "20:00"
        load_balancer_type: "DepthFirst"

# -----------------------------------------------------------------------------
# Monitoring & Diagnostics
# -----------------------------------------------------------------------------
monitoring:
  log_analytics:
    workspace_name: "law-iic-avd-eus-01"
    resource_group: "rg-iic-mgmt-eus-01"      # Can use existing LAW in a shared management RG
    retention_days: 30
  diagnostics:
    enable_host_pool_diagnostics: true
    enable_workspace_diagnostics: true
    log_categories:                            # AVD diagnostic categories to enable
      - "Checkpoint"
      - "Error"
      - "Management"
      - "Connection"
      - "HostRegistration"
      - "AgentHealthStatus"
  defender:
    enable_defender_for_cloud: false           # Enable Microsoft Defender for Cloud on session hosts
  alerts:
    enable_alerts: false
    action_group_id: ""                        # Resource ID of the action group for alert notifications

# -----------------------------------------------------------------------------
# Image Management
# -----------------------------------------------------------------------------
image:
  source: "marketplace"                        # marketplace | gallery | custom
  marketplace:
    publisher: "MicrosoftWindowsDesktop"
    offer: "windows-11"
    sku: "win11-23h2-avd"
  gallery:
    gallery_image_id: ""                       # Full ARM resource ID of the Azure Compute Gallery image
  customization:
    install_m365_apps: false                   # Install Microsoft 365 Apps via Chocolatey/Winget
    install_teams_new: false                   # Install New Microsoft Teams
    install_onedrive: false                    # Install OneDrive per-machine
    additional_scripts: []                     # List of PowerShell script URLs to execute during image build

# -----------------------------------------------------------------------------
# Networking
# -----------------------------------------------------------------------------
networking:
  private_endpoints:
    enabled: false                             # Deploy private endpoints for AVD feed and gateway
    subnet_id: ""                              # Subnet for private endpoints
  nsg:
    apply_default_avd_rules: true              # Apply standard AVD NSG rules (RDP, HTTPS outbound)

# -----------------------------------------------------------------------------
# Tags
# -----------------------------------------------------------------------------
tags:
  Environment: "Production"
  Project: "AVD on Azure Local"
  ManagedBy: "Infrastructure as Code"
  Owner: "Platform Team"
  CostCenter: "IT-Infrastructure"

# -----------------------------------------------------------------------------
# Ansible (configure/)
# -----------------------------------------------------------------------------
ansible:
  ansible_connection: "local"
